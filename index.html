<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小蓝书本地测试版</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="#discover" aria-label="首页">小蓝书</a>

      <nav class="side-nav" aria-label="主导航">
        <button class="side-item active" data-section="discover">
          <span class="side-icon">⌂</span><span>发现</span>
        </button>
        <button class="side-item" data-section="live">
          <span class="side-icon">▷</span><span>直播</span>
        </button>
        <button class="side-item" data-section="publish">
          <span class="side-icon">＋</span><span>发布</span>
        </button>
        <button class="side-item" data-section="notice">
          <span class="side-icon">♡</span><span>通知</span>
        </button>
        <button class="side-item" data-section="me">
          <img class="side-avatar" src="assets/avatars/my-avatar.png" alt="我的头像">
          <span>我</span>
        </button>
      </nav>

      <div class="sidebar-bottom">
        <button class="plain-link" data-section="more">更多</button>
        <button class="plain-link" data-section="about">关于</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="search-wrap">
          <input id="searchInput" type="search" placeholder="搜索小蓝书" autocomplete="off" />
          <span class="search-icon">⌕</span>
        </div>
        <div class="top-links">
          <button class="text-link" data-section="creator">创作中心</button>
          <button class="text-link" data-section="business">业务合作</button>
          <button id="authOpenBtn" class="login-pill">登录 / 注册</button>
          <div id="userMenu" class="user-menu" hidden>
            <span id="userName"></span>
            <button id="logoutBtn" class="text-link">退出</button>
            <button id="deleteAccountBtn" class="danger-link">注销账号</button>
          </div>
        </div>
      </header>

      <section id="discoverSection" class="page-section show">
        <div id="categoryTabs" class="category-tabs" aria-label="分类筛选"></div>
        <div id="statsLine" class="stats-line"></div>
        <div id="cardGrid" class="card-grid" aria-live="polite"></div>
      </section>

      <section id="placeholderSection" class="page-section placeholder-page" hidden>
        <div class="placeholder-card">
          <p class="placeholder-kicker">本地测试功能</p>
          <h1 id="placeholderTitle">待开发</h1>
          <p id="placeholderText">这里预留了入口，后续可以继续接真实功能。</p>
        </div>
      </section>
    </main>
  </div>

  <div id="detailModal" class="modal" aria-hidden="true">
    <button id="modalClose" class="modal-close" aria-label="关闭详情">×</button>
    <article class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <section class="modal-media">
        <button id="prevMedia" class="media-arrow media-prev" aria-label="上一张">‹</button>
        <img id="modalImage" src="" alt="" />
        <video id="modalVideo" controls playsinline></video>
        <button id="nextMedia" class="media-arrow media-next" aria-label="下一张">›</button>
        <div id="mediaCounter" class="media-counter">1/1</div>
        <div id="mediaDots" class="media-dots"></div>
      </section>

      <section class="modal-info">
        <div class="author-row">
          <img id="modalAvatar" class="author-avatar" src="" alt="作者头像" />
          <div>
            <div id="modalAuthor" class="author-name"></div>
            <div id="modalMeta" class="meta-text"></div>
          </div>
          <button class="follow-btn">关注</button>
        </div>

        <div class="post-body">
          <h2 id="modalTitle"></h2>
          <p id="modalContent"></p>
          <div id="modalTags" class="tag-list"></div>
        </div>

        <div class="comment-header">
          <span id="commentTitle">共 0 条评论</span>
        </div>
        <div id="commentList" class="comment-list"></div>

        <form id="commentForm" class="comment-form">
          <input id="commentInput" type="text" maxlength="300" placeholder="登录后写评论" />
          <button type="submit">发送</button>
        </form>

        <footer class="modal-actions">
          <button id="likeBtn" class="action-btn" type="button">♥ <span id="likeCount">0</span></button>
          <button id="favBtn" class="action-btn" type="button">★ <span id="favCount">0</span></button>
          <button class="action-btn" type="button">评论 <span id="commentCount">0</span></button>
          <button class="action-btn" type="button">分享</button>
        </footer>
      </section>
    </article>
  </div>

  <div id="authModal" class="auth-modal" aria-hidden="true">
    <div class="auth-card" role="dialog" aria-modal="true" aria-labelledby="authTitle">
      <button id="authCloseBtn" class="auth-close" aria-label="关闭">×</button>
      <h2 id="authTitle">登录本地账号</h2>
      <p class="auth-tip">点赞、评论、收藏需要先登录。账号只保存在你电脑本地的 SQLite 数据库里。</p>
      <form id="authForm" class="auth-form">
        <label>
          用户名
          <input id="authUsername" name="username" autocomplete="username" required minlength="2" maxlength="24" />
        </label>
        <label>
          密码
          <input id="authPassword" name="password" type="password" autocomplete="current-password" required minlength="4" maxlength="72" />
        </label>
        <button id="authSubmitBtn" type="submit">登录</button>
      </form>
      <button id="authSwitchBtn" class="auth-switch" type="button">没有账号？注册一个</button>
      <p id="authMessage" class="auth-message" role="status"></p>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
